<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoboPaper Top 500 — Tag Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #f8f9fa;
  --surface-2: #f1f3f4;
  --border: #dadce0;
  --text-primary: #202124;
  --text-secondary: #5f6368;
  --text-tertiary: #80868b;
  --accent: #1a73e8;
  --accent-hover: #1765cc;
  --accent-bg: #e8f0fe;
  --shadow-1: 0 1px 2px 0 rgba(60,64,67,.1), 0 1px 3px 1px rgba(60,64,67,.05);
  --shadow-2: 0 1px 3px 0 rgba(60,64,67,.15), 0 4px 8px 3px rgba(60,64,67,.08);

  --tag-문제정의: #6366f1;
  --tag-평가축: #06b6d4;
  --tag-방법전환: #3b82f6;
  --tag-인프라: #22c55e;
  --tag-경고신호: #ef4444;
  --tag-통합정리: #a855f7;
  --tag-스케일업: #f97316;
  --tag-실사용전환: #14b8a6;
  --tag-데이터전환: #f59e0b;
  --tag-해부분석: #ec4899;
  --tag-표준후보: #8b5cf6;
  --tag-위험보류: #6b7280;

  --venue-ICRA: #1976d2;
  --venue-IROS: #d84315;
  --venue-RA-L: #388e3c;
  --venue-T-RO: #7b1fa2;
  --venue-RSS: #f57c00;
  --venue-IJRR: #c2185b;
  --venue-Sci-Rob: #00796b;
  --venue-SoRo: #5d4037;
  --venue-T-Mech: #455a64;
  --venue-T-FR: #afb42b;
  --venue-RA-P: #00838f;
  --venue-T-ASE: #6a1b9a;
  --venue-RAM: #ef6c00;
  --venue-CoRL: #303f9f;
  --venue-iSpaRo: #00695c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Roboto', 'Noto Sans KR', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  color: var(--text-primary);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ===== Header ===== */
.app-header {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 50;
}

.app-header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 24px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 24px;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #4285f4 0%, #34a853 50%, #fbbc04 75%, #ea4335 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 14px;
}

.logo-title {
  font-size: 20px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.2px;
}

.logo-sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.search-box {
  position: relative;
  max-width: 640px;
  margin: 0 auto;
  width: 100%;
}

.search-input {
  width: 100%;
  height: 44px;
  padding: 0 16px 0 48px;
  border: 1px solid var(--border);
  border-radius: 24px;
  font-size: 15px;
  font-family: inherit;
  background: var(--bg);
  outline: none;
  transition: box-shadow .2s, border-color .2s;
}
.search-input:hover { box-shadow: var(--shadow-1); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  pointer-events: none;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.btn {
  height: 36px;
  padding: 0 16px;
  border-radius: 18px;
  font-size: 14px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background .15s;
}

.btn-text { color: var(--accent); }
.btn-text:hover { background: var(--accent-bg); }

.btn-outline {
  border: 1px solid var(--border);
  color: var(--text-primary);
  background: var(--bg);
}
.btn-outline:hover { background: var(--surface); }

/* ===== Layout ===== */
.layout {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 24px;
}

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static !important; max-height: none !important; }
}

/* ===== Sidebar ===== */
.sidebar {
  position: sticky;
  top: 96px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  padding-right: 4px;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.filter-section {
  margin-bottom: 28px;
}

.filter-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.filter-title-action {
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  cursor: pointer;
}
.filter-title-action:hover { text-decoration: underline; }

.tag-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag-chip {
  padding: 6px 10px;
  border-radius: 14px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
  background: var(--surface);
  color: var(--text-primary);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all .15s;
  user-select: none;
  white-space: nowrap;
}

.tag-chip:hover { background: var(--surface-2); }

.tag-chip.active {
  color: white;
  border-color: transparent;
}

.tag-chip .count {
  font-size: 11px;
  opacity: 0.7;
  font-variant-numeric: tabular-nums;
}

.tag-chip.active .count { opacity: 0.85; }

.tag-mode-toggle {
  display: flex;
  background: var(--surface);
  border-radius: 14px;
  padding: 2px;
  margin-top: 10px;
  width: fit-content;
}

.tag-mode-toggle button {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 12px;
  color: var(--text-secondary);
}
.tag-mode-toggle button.active {
  background: var(--bg);
  color: var(--text-primary);
  box-shadow: var(--shadow-1);
}

.venue-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.venue-chip {
  padding: 5px 10px;
  border-radius: 12px;
  font-size: 12px;
  background: var(--surface);
  color: var(--text-secondary);
  font-family: 'Roboto Mono', monospace;
  font-weight: 500;
  transition: all .15s;
  border-left: 3px solid var(--venue-color, var(--border));
}
.venue-chip:hover { background: var(--surface-2); color: var(--text-primary); }
.venue-chip.active { background: var(--venue-color, var(--text-primary)); color: white; border-left-color: transparent; }

.year-range {
  display: flex;
  gap: 8px;
  align-items: center;
}

.year-input {
  width: 72px;
  height: 32px;
  padding: 0 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Roboto Mono', monospace;
  text-align: center;
  outline: none;
}
.year-input:focus { border-color: var(--accent); }

.combo-size-toggle {
  display: flex;
  background: var(--surface);
  border-radius: 14px;
  padding: 2px;
  width: fit-content;
  margin-bottom: 12px;
}
.combo-size-toggle button {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 12px;
  color: var(--text-secondary);
}
.combo-size-toggle button.active {
  background: var(--bg);
  color: var(--text-primary);
  box-shadow: var(--shadow-1);
}

.combo-presets {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.combo-preset {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid transparent;
  width: 100%;
  text-align: left;
  transition: background .15s, border-color .15s;
}
.combo-preset:hover { background: var(--surface-2); }
.combo-preset.active { border-color: var(--accent); background: var(--accent-bg); }

.combo-preset-tags {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  flex: 1;
  min-width: 0;
}

.combo-preset-pill {
  padding: 2px 6px;
  border-radius: 9px;
  font-size: 10px;
  font-weight: 500;
  color: white;
  white-space: nowrap;
}

.combo-preset-count {
  font-family: 'Roboto Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.page-size-select {
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
}
.page-size-select:hover { border-color: var(--text-secondary); }

/* ===== Main / Stats ===== */
.main-stats {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.stats-count {
  font-size: 13px;
  color: var(--text-secondary);
}
.stats-count strong {
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

.sort-select {
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
}
.sort-select:hover { border-color: var(--text-secondary); }

/* ===== Paper List ===== */
.paper-list {
  display: flex;
  flex-direction: column;
}

.paper-row {
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 16px;
  transition: background .12s;
}

.paper-row:hover { background: var(--surface); }

.paper-rank {
  font-family: 'Roboto Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-tertiary);
  text-align: right;
  padding-top: 2px;
  font-variant-numeric: tabular-nums;
}

.paper-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
  font-size: 12px;
}

.paper-venue {
  background: var(--venue-color, var(--text-primary));
  color: white;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: 'Roboto Mono', monospace;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.3px;
}

.paper-year {
  color: var(--text-secondary);
  font-family: 'Roboto Mono', monospace;
  font-variant-numeric: tabular-nums;
}

.paper-citations {
  margin-left: auto;
  color: var(--text-secondary);
  font-family: 'Roboto Mono', monospace;
  font-variant-numeric: tabular-nums;
  display: flex;
  align-items: center;
  gap: 3px;
}
.paper-citations svg { color: var(--text-tertiary); }

.paper-title {
  font-size: 16px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.paper-authors {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
  line-height: 1.4;
}

.paper-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.paper-tag {
  padding: 3px 9px;
  border-radius: 11px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: transform .1s, opacity .1s;
  user-select: none;
}
.paper-tag:hover { transform: translateY(-1px); }
.paper-tag:active { opacity: 0.85; }

.empty-state {
  padding: 80px 20px;
  text-align: center;
  color: var(--text-secondary);
}
.empty-state-emoji { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state-title { font-size: 16px; color: var(--text-primary); margin-bottom: 8px; }
.empty-state-desc { font-size: 13px; }

.show-more {
  margin: 24px auto;
  padding: 10px 24px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--accent);
  font-weight: 500;
  font-size: 14px;
  display: block;
  transition: all .15s;
}
.show-more:hover { background: var(--accent-bg); border-color: var(--accent); }

/* Distribution mini bar */
.tag-dist {
  display: flex;
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
  background: var(--surface-2);
  margin-top: 12px;
}

.tag-dist-segment {
  height: 100%;
  transition: width .3s;
}
</style>
</head>

<header class="app-header">
  <div class="app-header-inner">
    <div class="logo">
      <div class="logo-mark">R</div>
      <div>
        <div class="logo-title">RoboPaper Top 500</div>
        <div class="logo-sub">Tag Explorer · 2010–2026 · citations as of 2026-05-08 (Semantic Scholar)</div>
      </div>
    </div>
    <div class="search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <input class="search-input" id="search" type="search" placeholder="제목·저자 검색...">
    </div>
    <div class="header-actions">
      <a class="btn btn-text" href="tags_guide.html" title="12 태그 정의와 좋은 논문 공식">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        태그 가이드
      </a>
      <button class="btn btn-outline" id="reset-btn">Reset</button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-title">
        Tags
        <span class="filter-title-action" id="clear-tags">Clear</span>
      </div>
      <div class="tag-chips" id="tag-filters"></div>
      <div class="tag-mode-toggle" id="tag-mode" title="여러 태그를 골랐을 때 매칭 방식 — AND: 다 가진 논문 / OR: 하나라도 가진 논문">
        <button data-mode="any">OR</button>
        <button class="active" data-mode="all">AND</button>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Top Combinations</div>
      <div class="combo-size-toggle" id="combo-size">
        <button data-size="2">2-tag</button>
        <button data-size="3" class="active">3-tag</button>
        <button data-size="4">4-tag</button>
      </div>
      <div class="combo-presets" id="combo-presets"></div>
    </div>

    <div class="filter-section">
      <div class="filter-title">
        Venues
        <span class="filter-title-action" id="clear-venues">Clear</span>
      </div>
      <div class="venue-list" id="venue-filters"></div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Year</div>
      <div class="year-range">
        <input class="year-input" id="year-min" type="number" min="2010" max="2026" value="2010">
        <span style="color:var(--text-tertiary)">—</span>
        <input class="year-input" id="year-max" type="number" min="2010" max="2026" value="2026">
      </div>
    </div>
  </aside>

  <main>
    <div class="main-stats">
      <div class="stats-count">
        <strong id="count-shown">500</strong> / 500 papers
        <div class="tag-dist" id="tag-dist"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select class="page-size-select" id="page-size" title="한 번에 보일 최대 개수">
          <option value="50">50개</option>
          <option value="100" selected>100개</option>
          <option value="200">200개</option>
          <option value="500">500개</option>
          <option value="999999">전체</option>
        </select>
        <select class="sort-select" id="sort">
          <option value="citations">정렬: 인용수 ↓</option>
          <option value="year-desc">정렬: 최신순</option>
          <option value="year-asc">정렬: 오래된순</option>
          <option value="rank">정렬: 원래 순위</option>
          <option value="title">정렬: 제목 (A-Z)</option>
        </select>
      </div>
    </div>
    <div class="paper-list" id="paper-list"></div>
    <button class="show-more" id="show-more" style="display:none">Show more</button>
  </main>
</div>

{"rank": 492, "venue": "ICRA", "year": 2020, "title": "Loam livox: A fast, robust, high-precision LiDAR odometry and mapping package for LiDARs of small FoV", "authors_first": "Jiarong Lin", "citations": 345, "tags": ["방법전환", "실사용전환"]},

{"rank": 498, "venue": "RA-L", "year": 2018, "title": "Unsupervised Deep Homography: A Fast and Robust Homography Estimation Model", "authors_first": "Ty Nguyen", "citations": 344, "tags": ["방법전환"]},
{"rank": 499, "venue": "IROS", "year": 2019, "title": "ReFusion: 3D Reconstruction in Dynamic Environments for RGB-D Cameras Exploiting Residuals", "authors_first": "Emanuele Palazzolo", "citations": 343, "tags": ["방법전환", "경고신호"]},
{"rank": 500, "venue": "IROS", "year": 2017, "title": "Shape completion enabled robotic grasping", "authors_first": "Jacob Varley", "citations": 343, "tags": ["방법전환"]}
]}
</script>

<script>
const TAG_LEGEND = {
  "문제정의": "새 문제·연구 질문을 세운다",
  "평가축": "성능을 재는 기준을 바꾼다",
  "방법전환": "같은 병목을 다른 formulation·구조로 푼다",
  "인프라": "데이터셋·벤치마크·툴·평가 파이프라인을 만든다",
  "경고신호": "failure mode·negative result·deployment risk를 드러낸다",
  "통합정리": "survey·taxonomy로 분야의 좌표를 잡는다",
  "스케일업": "모델·데이터·embodiment·실험 수를 키운다",
  "실사용전환": "latency·real-time·on-device·hardware·closed-loop을 직접 겨냥한다",
  "데이터전환": "병목을 데이터 수집·정제·합성에서 푼다",
  "해부분석": "모델의 mechanism·내부 표현·ablation을 뜯어본다",
  "표준후보": "후속 논문이 계속 쓸 task·metric·protocol·benchmark를 제안한다",
  "위험보류": "baseline·split·ablation·공개성 때문에 claim 확인이 필요하다"
};
const TAG_ORDER = Object.keys(TAG_LEGEND);
const TAG_COLOR = (t) => `var(--tag-${t})`;

// Named presets retained for backwards-compatible URL hash from tag guide page
const PRESETS = {
  A1: { tags: ["문제정의","평가축","표준후보"], mode: "all" },
  A2: { tags: ["경고신호","평가축","표준후보"], mode: "all" },
  A3: { tags: ["방법전환","실사용전환","경고신호"], mode: "all" },
  A4: { tags: ["실사용전환","인프라","평가축"], mode: "all" },
  A5: { tags: ["인프라","데이터전환","표준후보"], mode: "all" },
  weak: { tags: ["방법전환"], mode: "all", soloOnly: true }
};

let PAPERS = [];
const STATE = {
  search: "",
  selectedTags: new Set(),
  selectedVenues: new Set(),
  yearMin: 2010,
  yearMax: 2026,
  sort: "citations",
  tagMode: "all",
  pageSize: 100,
  shown: 100,
  soloOnly: false,
  comboSize: 3
};

// === Init ===
document.addEventListener('DOMContentLoaded', () => {
  loadData();
  renderTagFilters();
  renderVenueFilters();
  renderTopCombos(STATE.comboSize);
  attachEvents();
  applyHashPreset();
  render();
});

// === Top combinations (data-driven) ===
function kCombinations(arr, k) {
  if (k > arr.length || k <= 0) return [];
  if (k === 1) return arr.map(x => [x]);
  const result = [];
  for (let i = 0; i <= arr.length - k; i++) {
    const head = arr[i];
    const tailCombos = kCombinations(arr.slice(i + 1), k - 1);
    for (const tc of tailCombos) result.push([head, ...tc]);
  }
  return result;
}

function computeTopCombos(papers, size, topN) {
  const counts = new Map();
  for (const p of papers) {
    if (p.tags.length < size) continue;
    const combos = kCombinations(p.tags, size);
    for (const c of combos) {
      const sorted = c.slice().sort();
      const key = sorted.join('|');
      const entry = counts.get(key) || { tags: sorted, count: 0 };
      entry.count++;
      counts.set(key, entry);
    }
  }
  return [...counts.values()].sort((a, b) => b.count - a.count).slice(0, topN);
}

function renderTopCombos(size) {
  const combos = computeTopCombos(PAPERS, size, 12);
  const el = document.getElementById('combo-presets');
  if (!combos.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-tertiary);padding:6px 4px">no combinations</div>'; return; }
  const currentSet = STATE.selectedTags;
  el.innerHTML = combos.map(c => {
    const tagsAttr = c.tags.join(',');
    const isActive = STATE.tagMode === 'all' && currentSet.size === c.tags.length && c.tags.every(t => currentSet.has(t));
    const pills = c.tags.map(t => `<span class="combo-preset-pill" style="background:var(--tag-${t})" title="${TAG_LEGEND[t]||''}">${t}</span>`).join('');
    return `<button class="combo-preset ${isActive?'active':''}" data-tags="${tagsAttr}" title="${c.tags.join(' + ')} 조합 (${c.count}편)">
      <div class="combo-preset-tags">${pills}</div>
      <div class="combo-preset-count">${c.count}</div>
    </button>`;
  }).join('');
  el.querySelectorAll('.combo-preset').forEach(b => {
    b.addEventListener('click', () => applyComboPreset(b.dataset.tags.split(',')));
  });
}

function applyComboPreset(tags) {
  STATE.selectedTags = new Set(tags);
  STATE.tagMode = 'all';
  STATE.soloOnly = false;
  STATE.shown = STATE.pageSize;
  document.querySelectorAll('#tag-mode button').forEach(x => x.classList.toggle('active', x.dataset.mode === 'all'));
  render(true);
}

function applyHashPreset() {
  const m = window.location.hash.match(/preset=([A-Za-z0-9_]+)/);
  if (m && PRESETS[m[1]]) applyPreset(m[1]);
}
window.addEventListener('hashchange', applyHashPreset);

function loadData() {
  const raw = document.getElementById('paper-data').textContent;
  const obj = JSON.parse(raw);
  PAPERS = obj.papers;
}

// === Render filters ===
function renderTagFilters() {
  // Filter-aware counts: how many papers in the current filtered subset have each tag
  const counts = countByTag(filterPapers());
  const el = document.getElementById('tag-filters');
  el.innerHTML = TAG_ORDER.map(t => {
    const active = STATE.selectedTags.has(t);
    const bg = active ? TAG_COLOR(t) : '';
    return `<button class="tag-chip ${active?'active':''}" data-tag="${t}"
              style="${active?`background:${bg}`:''}">
              ${t}<span class="count">${counts[t]||0}</span>
            </button>`;
  }).join('');
  el.querySelectorAll('.tag-chip').forEach(b => {
    b.addEventListener('click', () => toggleTag(b.dataset.tag));
  });
}

function renderVenueFilters() {
  const venues = [...new Set(PAPERS.map(p => p.venue))].sort();
  const el = document.getElementById('venue-filters');
  el.innerHTML = venues.map(v => {
    const active = STATE.selectedVenues.has(v);
    return `<button class="venue-chip ${active?'active':''}" data-venue="${v}" style="--venue-color:var(--venue-${v})">${v}</button>`;
  }).join('');
  el.querySelectorAll('.venue-chip').forEach(b => {
    b.addEventListener('click', () => toggleVenue(b.dataset.venue));
  });
}

// === Events ===
function attachEvents() {
  document.getElementById('search').addEventListener('input', e => {
    STATE.search = e.target.value.toLowerCase();
    STATE.shown = STATE.pageSize;
    render();
  });
  document.getElementById('sort').addEventListener('change', e => {
    STATE.sort = e.target.value;
    render();
  });
  document.getElementById('year-min').addEventListener('input', e => {
    STATE.yearMin = parseInt(e.target.value) || 2010;
    render();
  });
  document.getElementById('year-max').addEventListener('input', e => {
    STATE.yearMax = parseInt(e.target.value) || 2026;
    render();
  });
  document.getElementById('reset-btn').addEventListener('click', resetAll);
  document.getElementById('clear-tags').addEventListener('click', () => {
    STATE.selectedTags.clear();
    STATE.soloOnly = false;
    render(true);
  });
  document.getElementById('clear-venues').addEventListener('click', () => {
    STATE.selectedVenues.clear();
    render(true);
  });
  document.querySelectorAll('#tag-mode button').forEach(b => {
    b.addEventListener('click', () => {
      STATE.tagMode = b.dataset.mode;
      document.querySelectorAll('#tag-mode button').forEach(x => x.classList.toggle('active', x===b));
      render();
    });
  });
  document.getElementById('page-size').addEventListener('change', e => {
    STATE.pageSize = parseInt(e.target.value);
    STATE.shown = STATE.pageSize;
    render();
  });
  document.querySelectorAll('#combo-size button').forEach(b => {
    b.addEventListener('click', () => {
      STATE.comboSize = parseInt(b.dataset.size);
      document.querySelectorAll('#combo-size button').forEach(x => x.classList.toggle('active', x === b));
      renderTopCombos(STATE.comboSize);
    });
  });
  document.getElementById('show-more').addEventListener('click', () => {
    STATE.shown += STATE.pageSize;
    render();
  });
}

function toggleTag(tag) {
  if (STATE.selectedTags.has(tag)) STATE.selectedTags.delete(tag);
  else STATE.selectedTags.add(tag);
  STATE.soloOnly = false;
  STATE.shown = STATE.pageSize;
  render(true);
}

function toggleVenue(v) {
  if (STATE.selectedVenues.has(v)) STATE.selectedVenues.delete(v);
  else STATE.selectedVenues.add(v);
  STATE.shown = STATE.pageSize;
  render(true);
}

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  STATE.selectedTags = new Set(p.tags);
  STATE.tagMode = p.mode;
  STATE.soloOnly = !!p.soloOnly;
  document.querySelectorAll('#tag-mode button').forEach(x => x.classList.toggle('active', x.dataset.mode===p.mode));
  STATE.shown = STATE.pageSize;
  render(true);
}

function resetAll() {
  STATE.search = "";
  STATE.selectedTags.clear();
  STATE.selectedVenues.clear();
  STATE.yearMin = 2010;
  STATE.yearMax = 2026;
  STATE.sort = "citations";
  STATE.tagMode = "all";
  STATE.pageSize = 100;
  STATE.shown = 100;
  STATE.soloOnly = false;
  STATE.comboSize = 3;
  document.getElementById('search').value = "";
  document.getElementById('sort').value = "citations";
  document.getElementById('page-size').value = "100";
  document.getElementById('year-min').value = 2010;
  document.getElementById('year-max').value = 2026;
  document.querySelectorAll('#tag-mode button').forEach(x => x.classList.toggle('active', x.dataset.mode==='all'));
  document.querySelectorAll('#combo-size button').forEach(x => x.classList.toggle('active', x.dataset.size==='3'));
  render(true);
}

// === Filter / Sort ===
function filterPapers() {
  return PAPERS.filter(p => {
    if (STATE.search) {
      const q = STATE.search;
      if (!p.title.toLowerCase().includes(q) && !p.authors_first.toLowerCase().includes(q)) return false;
    }
    if (STATE.selectedTags.size > 0) {
      if (STATE.tagMode === 'all') {
        for (const t of STATE.selectedTags) if (!p.tags.includes(t)) return false;
      } else {
        let any = false;
        for (const t of STATE.selectedTags) if (p.tags.includes(t)) { any = true; break; }
        if (!any) return false;
      }
    }
    if (STATE.soloOnly && p.tags.length !== 1) return false;
    if (STATE.selectedVenues.size > 0 && !STATE.selectedVenues.has(p.venue)) return false;
    if (p.year < STATE.yearMin || p.year > STATE.yearMax) return false;
    return true;
  });
}

function sortPapers(arr) {
  const cmp = {
    citations: (a, b) => b.citations - a.citations,
    'year-desc': (a, b) => b.year - a.year || b.citations - a.citations,
    'year-asc': (a, b) => a.year - b.year || b.citations - a.citations,
    rank: (a, b) => a.rank - b.rank,
    title: (a, b) => a.title.localeCompare(b.title)
  }[STATE.sort];
  return [...arr].sort(cmp);
}

// === Render papers ===
function render(refreshFilters) {
  const filtered = sortPapers(filterPapers());
  document.getElementById('count-shown').textContent = filtered.length.toLocaleString();
  renderTagDist(filtered);
  renderPaperList(filtered);
  if (refreshFilters) {
    renderTagFilters();
    renderVenueFilters();
    renderTopCombos(STATE.comboSize);
  }
}

function renderPaperList(filtered) {
  const list = document.getElementById('paper-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-state-emoji">🔍</div>
      <div class="empty-state-title">조건에 맞는 논문이 없습니다</div>
      <div class="empty-state-desc">필터를 줄이거나 Reset을 눌러보세요</div>
    </div>`;
    document.getElementById('show-more').style.display = 'none';
    return;
  }
  const slice = filtered.slice(0, STATE.shown);
  list.innerHTML = slice.map(renderPaperRow).join('');
  list.querySelectorAll('.paper-tag').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      toggleTag(el.dataset.tag);
    });
  });
  document.getElementById('show-more').style.display =
    filtered.length > STATE.shown ? 'block' : 'none';
}

function renderPaperRow(p) {
  const tags = p.tags.map(t => `
    <span class="paper-tag" data-tag="${t}" style="background:${TAG_COLOR(t)};color:white" title="${TAG_LEGEND[t]||''}">${t}</span>
  `).join('');
  return `
    <div class="paper-row">
      <div class="paper-rank">${p.rank}</div>
      <div>
        <div class="paper-meta">
          <span class="paper-venue" style="--venue-color:var(--venue-${p.venue})">${p.venue}</span>
          <span class="paper-year">${p.year}</span>
          <span class="paper-citations">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4L12 17l-6.3 4.4L8 14 2 9.4h7.6z"/></svg>
            ${p.citations.toLocaleString()}
          </span>
        </div>
        <div class="paper-title">${escapeHtml(p.title)}</div>
        <div class="paper-authors">${escapeHtml(p.authors_first)}</div>
        <div class="paper-tags">${tags}</div>
      </div>
    </div>
  `;
}

function renderTagDist(filtered) {
  const counts = countByTag(filtered);
  const total = Object.values(counts).reduce((a,b)=>a+b,0);
  const el = document.getElementById('tag-dist');
  if (total === 0) { el.innerHTML = ''; return; }
  el.innerHTML = TAG_ORDER.map(t => {
    const c = counts[t]||0;
    if (!c) return '';
    const w = (c/total*100).toFixed(2);
    return `<div class="tag-dist-segment" style="width:${w}%;background:${TAG_COLOR(t)}" title="${t}: ${c}"></div>`;
  }).join('');
}

function countByTag(arr) {
  const c = {};
  for (const p of arr) for (const t of p.tags) c[t] = (c[t]||0) + 1;
  return c;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}
</script>
